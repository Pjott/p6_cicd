name: First test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  connection_test:
    runs-on: ubuntu-latest
    steps:
      - name: repo code download
        uses: actions/checkout@v4

      - name: login to azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: connection check
        run: az account show